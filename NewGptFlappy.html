<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Bird AI</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:skyblue;
}
canvas{
  display:block;
  margin:auto;
  background:#70c5ce;
}
</style>
</head>
<body>

<audio id="bgm" src="music.mp3" loop></audio>

<canvas id="game" width="400" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gravity = 0.5;
const flap = -8;

let bird = {
  x:80,
  y:200,
  velocity:0,
  rotation:0
};

let pipes = [];
let frame = 0;
let score = 0;

function drawBird(){

  ctx.save();

  ctx.translate(bird.x,bird.y);
  ctx.rotate(bird.rotation);

  ctx.font="40px Arial";
  ctx.fillText("velin",-20,20);

  ctx.restore();

}

function createPipe(){

  let gap = 140;
  let top = Math.random()*300;

  pipes.push({
    x:canvas.width,
    top:top,
    bottom:top+gap
  });

}

function drawPipes(){

  pipes.forEach((p,i)=>{

    ctx.fillStyle="green";

    ctx.fillRect(p.x,0,50,p.top);
    ctx.fillRect(p.x,p.bottom,50,canvas.height);

    p.x -=2;

    if(p.x + 50 <0){
      pipes.splice(i,1);
      score++;
    }

  });

}

function updateBird(){

  bird.velocity += gravity;
  bird.y += bird.velocity;

  bird.rotation = bird.velocity * 0.05;

  if(bird.y > canvas.height){
    resetGame();
  }

}

function collision(){

  pipes.forEach(p=>{

    if(
      bird.x > p.x &&
      bird.x < p.x + 50 &&
      (bird.y < p.top || bird.y > p.bottom)
    ){
      resetGame();
    }

  });

}

function resetGame(){

  pipes=[];
  bird.y=200;
  bird.velocity=0;
  score=0;

}

function drawScore(){

  ctx.fillStyle="white";
  ctx.font="30px Arial";
  ctx.fillText("Score: "+score,10,40);

}

function gameLoop(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(frame % 120 === 0){
    createPipe();
  }

  drawPipes();
  updateBird();
  drawBird();
  drawScore();
  collision();

  frame++;

  requestAnimationFrame(gameLoop);

}

document.addEventListener("click",()=>{

  bird.velocity = flap;

  document.getElementById("bgm").play();

});

gameLoop();

</script>

</body>
</html>
